---
- name: Set git default branch to main
  community.general.git_config:
    name: init.defaultBranch
    value: "{{ git_default_branch }}"
    scope: global

- name: Set git pull to rebase by default
  community.general.git_config:
    name: pull.rebase
    value: "true"
    scope: global

- name: Set global gitignore path
  community.general.git_config:
    name: core.excludesFile
    value: "{{ ansible_env.HOME }}/.gitignore_global"
    scope: global

- name: Set git user name
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global
  when: git_user_name | length > 0

- name: Set git user email
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global
  when: git_user_email | length > 0

- name: Deploy global gitignore
  ansible.builtin.template:
    src: gitignore_global.j2
    dest: "{{ ansible_env.HOME }}/.gitignore_global"
    mode: '0644'
    backup: true

- name: Ensure fish config.d directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/fish/conf.d"
    state: directory
    mode: '0755'

- name: Ensure direnv is hooked into fish
  ansible.builtin.copy:
    content: "direnv hook fish | source\n"
    dest: "{{ ansible_env.HOME }}/.config/fish/conf.d/direnv.fish"
    mode: '0644'
